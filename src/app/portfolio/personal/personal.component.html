<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal</title>
</head>
<body>
    <div class="">
        <div class=" border
        relative overflow-hidden bg-cover bg-repeat p-12 text-center bg-center"
        style="background-image: url('assets/images/bg-port.jpg'); height: 600px">
         <button
         type="button"
         class="rounded border-2 border:origin-center border:rotate-45  border-neutral-50 px-7 pb-[8px] pt-[10px] text-sm font-medium uppercase leading-normal text-neutral-50 transition duration-150 ease-in-out hover:border-neutral-100 hover:bg-neutral-500 hover:bg-opacity-10 hover:text-neutral-100 focus:border-neutral-100 focus:text-neutral-100 focus:outline-none focus:ring-0 active:border-neutral-200 active:text-neutral-200 dark:hover:bg-neutral-100 dark:hover:bg-opacity-10"
         data-twe-ripple-init
         data-twe-ripple-color="light">
         Call to action
       </button>
        </div>

        <blockquote class="text-2xl font-semibold italic text-center text-slate-900">
            When you look
            <span class="relative">
              <span class="block absolute -inset-1 -skew-y-6 bg-pink-500" aria-hidden="true"></span>
              <span class="relative text-white">annoyed</span>
            </span>
            all the time, people think that you're busy.
          </blockquote>

          <div class="bg-white mt-10">
             <div class="bg-white relative  h-full">
                <div class="h-full bg-white  -inset-0 relative top-0 left-0 w-[420px] ml-[350px] skew-x-6 shadow-xl shadow-gray-400 py-10">
                    <div class="relative bg-white hover:bg-blue-500 hover:text-white w-96 py-5 pl-12 shadow-md mt-8 shadow-cyan-100 rounded-lg  -ml-32 font-medium text-xl text-gray-700 cursor-pointer">ERP System Development
                      <span class="absolute top-0 right-0 flex h-3 w-3 rounded-full">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-sky-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-3 w-3 bg-sky-500"></span>
                      </span>
                    </div>
                    <div class="bg-white hover:animate-pulse hover:bg-blue-500 hover:text-white w-96 py-5 pl-12 shadow-md mt-8 shadow-cyan-100 rounded-lg  -ml-32 font-medium text-xl text-gray-700 cursor-pointer">ERP System Development</div>
                    <div class="bg-white hover:bg-blue-500 hover:text-white w-96 py-5 pl-12 shadow-md mt-8 shadow-cyan-100 rounded-lg  -ml-32 font-medium text-xl text-gray-700 cursor-pointer">ERP System Development</div>
                    <div class="bg-white hover:bg-blue-500 hover:text-white w-96 py-5 pl-12 shadow-md mt-8 shadow-cyan-100 rounded-lg  -ml-32 font-medium text-xl text-gray-700 cursor-pointer">ERP System Development</div>
                    <div class="bg-white hover:bg-blue-500 hover:text-white w-96 py-5 pl-12 shadow-md mt-8 shadow-cyan-100 rounded-lg  -ml-32 font-medium text-xl text-gray-700 cursor-pointer">ERP System Development</div>
                    <div class="bg-white hover:bg-blue-500 hover:text-white w-96 py-5 pl-12 shadow-md mt-8 shadow-cyan-100 rounded-lg  -ml-32 font-medium text-xl text-gray-700 cursor-pointer">ERP System Development</div>
                    
                </div>
                
             </div>
          </div>
          <button type="button" class="bg-indigo-500 ..." disabled>
            <svg class="animate-spin h-5 w-5 mr-3 ..." viewBox="0 0 24 24">
              
            </svg>
            Processing...
          </button>

          <div class="flex items-center justify-center mt-10 bg-green-500">
            <!-- <div class="h-0 w-0 border-l-[32px] border-r-[32px] border-l-transparent border-r-transparent border-b-[64px] border-b-purple-50 ">25</div> -->

            <div class="w-0 h-0 border-l-[32px] border-l-transparent border-r-[32px] border-r-transparent border-b-[64px] border-b-purple-500">555</div>

<!-- Tailwind's `border` utilities don't support this directly, but you can still use inline styles -->

          </div>

          <div class="relative w-48 h-28 bg-yellow-500 mx-auto">
            <div class="before:content-[''] before:absolute before:w-0 before:border-l-[100px] before:border-l-transparent before:border-r-[100px] before:border-r-transparent before:border-b-[57.5px] before:border-b-red-500 before:bottom-full">
            </div>
            <div class="after:content-[''] after:absolute after:w-0 after:border-l-[100px] after:border-l-transparent after:border-r-[100px] after:border-r-transparent after:border-t-[57.5px] after:border-t-red-500 after:top-full">
            </div>
          </div>

          <div class="py-40 mt-10 bg-center bg-cover bg-no-repeat flex items-center flex-col" style="background-image: url(assets/images/n12.jpg)">
            <div class="line-clamp-2 flex items-center justify-center text-center">
                <span class="text-7xl text-white font-medium">Get involve in the <br> agriculture uprising</span>
            </div>
            <div class="relative mt-5">
              <input type="text" class="pl-3 py-2 outline-none rounded-full w-80 bg-white placeholder:text-gray-400 placeholder:text-sm placeholder:text-left" placeholder="Type your Email address">
              <div class="cursor-pointer absolute top-[2.5px] right-0.5 w-32 bg-lime-300 py-2 text-sm text-gray-800 flex items-center justify-center rounded-full">Join Now</div>
            </div>
          </div>

        
          
    </div>
</body>
</html>
