<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Login</title>
</head>
<body>
    <div class="w-full h-[500px] my-10 bg-[#FE5418] p-10">
        <!-- grid part  -->
         <div class="grid grid-cols-2 gap-x-5">
            <div class="col-span-1 px-10">
                <h1 class="text-6xl font-extrabold text-white leading-normal">
                    Sell on Bangladesh’s #1 Marketplace
                </h1>
                <h4 class="text-base text-white font-semibold">
                    Create a Daraz seller account in 5 minutes and reach millions of <br> customers today!
                </h4>
            </div>
            <!-- right part  -->
            <div class="col-span-1">
                <div class="mr-20 p-10 rounded-3xl bg-white">
                <div class="text-xl text-gray-600 font-medium mb-8">Login With Password</div>
                    <form action="" [formGroup]="sellerLogin" (ngSubmit)="onSubmit()">
                        <!-- Phone Number  or email-->
                        <div class="">
                           
                        <div class="w-full">
                            <input class="w-full pl-3 py-2 border hover:border-[#FF7B2E] placeholder:text-base outline-none text-sm rounded-lg" type="text" placeholder="Phone Number / Email" formControlName="Email">
                        </div>
                        </div>
                        

                         <!-- Password  -->
                         <div class="mt-3 mb-8">
                            
                        <div class="mt-2 w-full">
                            <input class="w-full pl-3 py-2 border hover:border-[#FF7B2E] placeholder:text-base outline-none text-sm rounded-lg" type="text" placeholder="Password" formControlName="password">
                        </div>
                        </div>

                        <button type="submit" [disabled]="!sellerLogin.valid" [routerLink]="['/my-orders']" class="flex items-center px-3 cursor-pointer transition-all duration-300 py-2 rounded-lg justify-center capitalize bg-[#f37932] hover:bg-[#FF7B2E] text-white text-base">
                            Login
                        </button>
                    </form>
                    <div class="grid grid-cols-2 mt-8">
                        <div class="col-span-1">
                            
                        </div>
                        <div class="col-span-1 flex flex-col justify-end items-end text-right space-y-1">
                            
                            <a href="#">
                                <h4 class="text-[#2A7BFF] text-sm">Reset Password</h4>
                            </a>
                            <a href="#">
                                <h4 class="text-[#2A7BFF] text-sm">Create a new account</h4>
                            </a>
                            <a href="#">
                                <h4 class="text-[#2A7BFF] text-sm">Register as a global seller</h4>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
         </div>
    </div>
</body>
</html>
