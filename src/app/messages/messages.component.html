<p>messages works!</p>

<div *ngIf="practiceService.messages.length">

    <h2>Messages</h2>
    <button type="button" class="clear"
            (click)="practiceService.clear()">Clear messages</button>
    <div *ngFor='let message of practiceService.messages'> {{message}} </div>
  
  </div>


  <!-- practice for input and output decorator -->

  <div class="filter">
        <button class="px-5 py-2 mr-5 rounded-lg border bg-green-500 text-white text-sm" *ngFor="let category of categories" (click)="selectCategory(category)">
          {{ category }}
        </button>
      </div>

      <!-- reactive forms module  -->

      <form [formGroup]="jobApplicationForm" (ngSubmit)="onSubmit()" class="max-w-lg mx-auto p-6 bg-white shadow-md rounded-md">
        <!-- Name Field -->
        <div class="mb-4">
          <label for="name" class="block text-gray-700 font-medium mb-2">Name:</label>
          <input 
            id="name" 
            formControlName="name" 
            class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="Enter your name" />
          <p *ngIf="jobApplicationForm.get('name')?.invalid && jobApplicationForm.get('name')?.touched"
             class="text-red-500 text-sm mt-1">Name is required.</p>
        </div>
      
        <!-- Email Field -->
        <div class="mb-4">
          <label for="email" class="block text-gray-700 font-medium mb-2">Email:</label>
          <input 
            id="email" 
            formControlName="email" 
            type="email"
            class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="Enter your email" />
          <p *ngIf="jobApplicationForm.get('email')?.invalid && jobApplicationForm.get('email')?.touched"
             class="text-red-500 text-sm mt-1">Valid email is required.</p>
        </div>
      
        <!-- Dynamic Skills Section -->
        <div formArrayName="skills" class="mb-6">
          <h3 class="text-lg font-semibold text-gray-700 mb-3">Skills</h3>
          <button 
            type="button" 
            (click)="addSkill()"
            class="mb-4 px-4 py-2 bg-green-500 text-white rounded hover:bg-green-600 focus:outline-none focus:ring-2 focus:ring-green-400">
            Add Skill
          </button>
      
          <div *ngFor="let skillForm of skills.controls; let i = index" class="mb-4 p-4 border border-gray-200 rounded-md bg-gray-50">
            <div class="" (formGroupName)="skillForm">
            <!-- Skill Name Field -->
            <div class="mb-2">
              <label for="skillName" class="block text-gray-600 font-medium mb-1">Skill Name:</label>
              <input 
                id="skillName" 
                formControlName="skillName"
                class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
                placeholder="Enter skill name" />
              <!-- <p *ngIf="skill.get('skillName')?.invalid && skill.get('skillName')?.touched"
                 class="text-red-500 text-sm mt-1">Skill name is required.</p> -->
            </div>
      
            <!-- Experience Field -->
            <div class="mb-2">
              <label for="experience" class="block text-gray-600 font-medium mb-1">Experience (years):</label>
              <input 
                id="experience" 
                formControlName="experience" 
                type="number"
                class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
                placeholder="Years of experience" />
              <!-- <p *ngIf="skill.get('experience')?.invalid && skill.get('experience')?.touched"
                 class="text-red-500 text-sm mt-1">Experience is required and should be at least 1 year.</p> -->
            </div>
      
            <!-- Remove Skill Button -->
            <button 
              type="button" 
              (click)="removeSkill(i)"
              class="mt-2 px-4 py-2 bg-red-500 text-white rounded hover:bg-red-600 focus:outline-none focus:ring-2 focus:ring-red-400">
              Remove Skill
            </button>
          </div>
          </div>
        </div>
      
        <!-- Submit Button -->
        <button 
          type="submit" 
          [disabled]="jobApplicationForm.invalid" 
          class="w-full py-2 bg-blue-500 text-white rounded hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-400">
          Submit Application
        </button>
      </form>
