<p>student-forms !</p>

<div class="w-full flex justify-between items-center my-10 relative">
    <div class="text-gray-700 text-2xl font-semibold">Students Forms</div>
    <div class="cursor-pointer px-10 py-2 rounded-lg bg-cyan-500 text-white font-medium text-lg">
        Add students
    </div>
</div>
<div class="h-screen w-screen absolute bg-gray-400 flex items-center justify-center p-10">
    <div class=" bg-white w-[900px] h-full p-5 rounded-lg shadow-lg">
        <!-- forms  -->
        <form [formGroup]="projectForm" (ngSubmit)="onSubmit()" class="max-w-lg p-6 bg-white shadow-md rounded-md">
            <!-- Project Name Field -->
            <div class="mb-4">
              <label for="projectName" class="block text-gray-700 font-medium mb-2">Project Name:</label>
              <input 
                id="projectName" 
                formControlName="projectName" 
                class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
                placeholder="Enter project name" />
              <p *ngIf="projectForm.get('projectName')?.invalid && projectForm.get('projectName')?.touched"
                 class="text-red-500 text-sm mt-1">Project name is required.</p>
            </div>
          
            <!-- Dynamic Team Members Section -->
            <div formArrayName="teamMembers">
              <h3 class="text-lg font-semibold text-gray-700 mb-3">Team Members</h3>
              <button 
                type="button" 
                (click)="addTeamMember()"
                class="mb-4 px-4 py-2 bg-green-500 text-white rounded hover:bg-green-600 focus:outline-none focus:ring-2 focus:ring-green-400">
                Add Team Member
              </button>
          
              <div *ngFor="let teamMember of teamMembers.controls; let i = index" [formGroupName]="i" class="mb-4 p-4 border border-gray-200 rounded-md bg-gray-50">
                <!-- Team Member Name Field -->
                <div class="mb-2">
                  <label for="name" class="block text-gray-600 font-medium mb-1">Name:</label>
                  <input 
                    id="name" 
                    formControlName="name"
                    class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="Enter name" />
                </div>
          
                <!-- Team Member Role Field -->
                <div class="mb-2">
                  <label for="role" class="block text-gray-600 font-medium mb-1">Role:</label>
                  <input 
                    id="role" 
                    formControlName="role"
                    class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="Enter role" />
                </div>
          
                <!-- Dynamic Skills Section for Each Team Member -->
                <div formArrayName="skills">
                  <h4 class="text-gray-700 font-medium mb-2">Skills</h4>
                  <button 
                    type="button" 
                    (click)="addSkill(i)"
                    class="mb-2 px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-400">
                    Add Skill
                  </button>
          
                  <div *ngFor="let skill of getSkills(i).controls; let j = index">
                    <div class="flex items-center mb-2">
                      <input 
                        [formControlName]="j"
                        class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
                        placeholder="Enter skill" />
                      <button 
                        type="button" 
                        (click)="removeSkill(i, j)"
                        class="ml-2 px-3 py-1 bg-red-500 text-white rounded hover:bg-red-600 focus:outline-none focus:ring-2 focus:ring-red-400">
                        Remove
                      </button>
                    </div>
                  </div>
                </div>
          
                <!-- Remove Team Member Button -->
                <button 
                  type="button" 
                  (click)="removeTeamMember(i)"
                  class="mt-2 px-4 py-2 bg-red-500 text-white rounded hover:bg-red-600 focus:outline-none focus:ring-2 focus:ring-red-400">
                  Remove Team Member
                </button>
              </div>
            </div>
          
            <!-- Submit Button -->
            <button 
              type="submit" 
              [disabled]="projectForm.invalid" 
              class="w-full py-2 bg-blue-500 text-white rounded hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-400">
              Submit Project
            </button>
          </form>
          

    </div>
</div>
